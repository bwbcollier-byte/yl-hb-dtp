name: Nightly Database Cleanup

on:
  schedule:
    - cron: "0 2 * * *" # 2am nightly
  workflow_dispatch: # Allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Note: This is a placeholder for running SQL via Supabase CLI or psql
      # You would need to set up SUPABASE_DB_URL secret
      - name: Install PostgreSQL Client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Test Connection
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Testing connection to Supabase..."
          if ! psql "$DATABASE_URL" -c "SELECT 1;" ; then
            echo "❌ Connection failed!"
            echo "If you see 'Network is unreachable', it is likely an IPv6 issue."
            echo "FIX: In Supabase, go to Settings -> Database -> Connection String -> URI."
            echo "Ensure 'Mode' is set to 'Session' (Port 5432) and use THAT string."
            exit 1
          fi
          echo "✅ Connection Success!"

      - name: Run Periodic Cleanup Scripts
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "🧹 Running Deduplication..."
          psql "$DATABASE_URL" -c "SET statement_timeout = '30min';" -f sql/cleanup/02-social-dedup.sql

          echo "🔗 Running Backlink Repair..."
          psql "$DATABASE_URL" -c "SET statement_timeout = '30min';" -f sql/cleanup/05-backlink-repair.sql

          echo "⭐ Running Social Rank Update..."
          psql "$DATABASE_URL" -c "SET statement_timeout = '30min';" -f sql/cleanup/07-social-rank.sql

      - name: Refresh Dashboard Stats
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "📊 Recalculating Dashboard KPIs in the background..."
          psql "$DATABASE_URL" -c "SELECT cron.schedule('manual-dashboard-refresh', '* * * * *', \$\$ SELECT refresh_dashboard_stats(); SELECT cron.unschedule('manual-dashboard-refresh'); \$\$);"
          echo "✅ Dashboard Stats Refresh Queued!"
